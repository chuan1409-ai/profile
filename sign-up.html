<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Đăng ký tài khoản</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  
  <style>
    /* Căn giữa toàn bộ trang */
    body {
      background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Khung đăng ký */
    .register-container {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
      margin: 20px;
    }

    /* Tiêu đề */
    h2 {
      text-align: center;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p.subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* Tùy chỉnh các ô nhập liệu */
    .form-group label {
      font-weight: 600;
      color: #555;
    }

    .form-control {
      border-radius: 8px;
      height: 45px;
      border: 1px solid #ddd;
      transition: all 0.3s;
    }

    .form-control:focus {
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.25);
      border-color: #007bff;
    }

    /* Nút đăng ký */
    .btn-register {
      width: 100%;
      height: 48px;
      border-radius: 8px;
      background: #007bff;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-register:hover {
      background: #0056b3;
      transform: translateY(-1px);
    }

    /* Link chuyển sang đăng nhập */
    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .login-link a {
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="register-container">
  <h2>Tạo tài khoản</h2>
  <p class="subtitle">Nhanh chóng và dễ dàng.</p>
  
  <form action="/register_process.php" method="POST">
    <!-- Họ và tên -->
    <div class="form-group">
      <label for="fullname">Họ và tên</label>
      <input type="text" class="form-control" id="fullname" placeholder="VD: Nguyễn Văn A" name="fullname" required>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" class="form-control" id="email" placeholder="email@viethan.com" name="email" required>
    </div>

    <!-- Mật khẩu -->
    <div class="form-group">
      <label for="pwd">Mật khẩu</label>
      <input type="password" class="form-control" id="pwd" placeholder="Nhập mật khẩu" name="pswd" required>
    </div>

    <!-- Xác nhận mật khẩu -->
    <div class="form-group">
      <label for="re-pwd">Xác nhận mật khẩu</label>
      <input type="password" class="form-control" id="re-pwd" placeholder="Nhập lại mật khẩu" name="re-pswd" required>
    </div>

    <!-- Điều khoản -->
    <div class="form-group form-check">
      <label class="form-check-label">
        <input class="form-check-input" type="checkbox" name="terms" required> Tôi đồng ý với các điều khoản dịch vụ
      </label>
    </div>

    <!-- Nút Submit -->
    <button type="submit" class="btn btn-register shadow-sm">Đăng ký ngay</button>
  </form>

  <!-- Chuyển hướng -->
  <div class="login-link">
    Bạn đã có tài khoản? <a href="#">Đăng nhập tại đây</a>
  </div>
</div>

</body>
</html>
